name: Run tests
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: playwright install --with-deps

    - name: OpenMRS Setup
      uses: ./.github/actions/openmrs-setup

    - name: Run API tests
      run: |
        mkdir -p artifacts/logs
        pytest -n 2 -m api --alluredir=allure-results --log-file=artifacts/logs/pytest.log --log-file-level=INFO

    - name: Collect OpenMRS Docker logs
      if: always()
      run: |
        mkdir -p artifacts/logs
        docker compose logs --no-color > artifacts/logs/openmrs-docker.log || true

    - name: Upload Allure results artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results
        if-no-files-found: ignore

    - name: Upload test logs artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: artifacts/logs
        if-no-files-found: ignore

  publish-allure-report:
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    steps:
    - uses: actions/checkout@v4

    - name: Download Allure results artifact
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: allure-results
        path: allure-results

    - name: Ensure Allure results directory exists
      run: mkdir -p allure-results

    - name: Prepare report directories
      run: mkdir -p .allure-history-cache

    - name: Generate Allure report with history
      uses: simple-elf/allure-report-action@v1.13
      with:
        allure_results: allure-results
        gh_pages: .allure-history-cache
        allure_history: allure-history
        keep_reports: 20

    - name: Verify generated report files
      run: |
        ls -la allure-history
        test -f allure-history/index.html

    - name: Upload generated Allure HTML artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-html-report
        path: allure-history
        if-no-files-found: error

    - name: Report location
      run: |
        echo "Allure HTML saved as artifact: allure-html-report"
        echo "Test logs saved as artifact: test-logs"
        echo "Download artifact from this workflow run and open index.html locally."
