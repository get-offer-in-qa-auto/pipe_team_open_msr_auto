name: Run tests
on:
  workflow_dispatch:
    inputs:
      send_metrics_report:
        description: 'Generate and send metrics report by email'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lint:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run style checks
      run: pre-commit run --all-files --show-diff-on-failure

  run-tests:
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ always() && (needs.lint.result == 'success' || needs.lint.result == 'skipped') }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: playwright install --with-deps

    - name: OpenMRS Setup
      uses: ./.github/actions/openmrs-setup

    - name: Run API and UI tests (combined Allure results)
      run: |
        mkdir -p artifacts/logs
        api_exit=0
        ui_exit=0

        pytest -n 2 -m api --alluredir=allure-results --log-file=artifacts/logs/pytest-api.log --log-file-level=INFO || api_exit=$?
        pytest -n 2 -m ui  --alluredir=allure-results --log-file=artifacts/logs/pytest-ui.log --log-file-level=INFO || ui_exit=$?

        if [ "$api_exit" -ne 0 ] || [ "$ui_exit" -ne 0 ]; then
          exit 1
        fi

    - name: Collect OpenMRS Docker logs
      if: always()
      run: |
        mkdir -p artifacts/logs
        docker compose logs --no-color > artifacts/logs/openmrs-docker.log || true

    - name: Upload Allure results artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results
        if-no-files-found: ignore

    - name: Upload test logs artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: artifacts/logs
        if-no-files-found: ignore

  publish-allure-report:
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    outputs:
      report_url: ${{ steps.report_url.outputs.url }}
      metrics_url: ${{ steps.report_url.outputs.metrics_url }}
    steps:
    - uses: actions/checkout@v4

    - name: Checkout gh-pages branch (history source)
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Download Allure results artifact
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: allure-results
        path: allure-results

    - name: Ensure Allure results directory exists
      run: mkdir -p allure-results

    - name: Prepare report directories
      run: mkdir -p gh-pages

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies for metrics dashboard
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate Allure report with history
      uses: simple-elf/allure-report-action@v1.13
      with:
        allure_results: allure-results
        gh_pages: gh-pages
        allure_history: allure-history
        keep_reports: 20

    - name: Verify generated report files
      run: |
        ls -la allure-history
        test -f allure-history/index.html

    - name: Build metrics dashboard from Allure results
      run: |
        mkdir -p downloaded_artifacts
        ARCHIVE_NAME="$(date +'%Y%m%d_%H%M%S')_${{ github.run_id }}_allure-results.zip"
        cd allure-results
        zip -r "../downloaded_artifacts/${ARCHIVE_NAME}" ./ || true
        cd ..
        python tools/build_metrics_dashboard.py \
          --artifacts-dir downloaded_artifacts \
          --report-title "QA Metrics Dashboard (${{ github.ref_name }})" \
          --output reports/metrics_dashboard.html

    - name: Add metrics dashboard to GitHub Pages content
      run: |
        # simple-elf/allure-report-action can leave allure-history with restrictive ownership/permissions
        # on some runners, which breaks mkdir/cp in the next steps.
        if [ -d allure-history ]; then
          sudo chown -R "$(id -u):$(id -g)" allure-history || true
          chmod -R u+rwX allure-history || true
        fi
        mkdir -p allure-history/metrics
        cp reports/metrics_dashboard.html allure-history/metrics/index.html

    - name: Upload generated Allure HTML artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-html-report
        path: allure-history
        if-no-files-found: error

    - name: Upload generated metrics dashboard artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: metrics-dashboard-html
        path: reports/metrics_dashboard.html
        if-no-files-found: error

    - name: Deploy Allure report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
        force_orphan: true

    - name: Publish report URL
      id: report_url
      run: |
        REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/index.html"
        METRICS_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/metrics/index.html"
        echo "url=${REPORT_URL}" >> "$GITHUB_OUTPUT"
        echo "metrics_url=${METRICS_URL}" >> "$GITHUB_OUTPUT"
        echo "### Allure report URL" >> "$GITHUB_STEP_SUMMARY"
        echo "${REPORT_URL}" >> "$GITHUB_STEP_SUMMARY"
        echo "### Metrics report URL" >> "$GITHUB_STEP_SUMMARY"
        echo "${METRICS_URL}" >> "$GITHUB_STEP_SUMMARY"
        echo "Allure report URL: ${REPORT_URL}"
        echo "Metrics report URL: ${METRICS_URL}"
        echo "Allure HTML saved as artifact: allure-html-report"
        echo "Metrics HTML saved as artifact: metrics-dashboard-html"
        echo "Test logs saved as artifact: test-logs"

  metrics-email-report:
    name: Metrics Report Email
    runs-on: ubuntu-latest
    needs: [ publish-allure-report ]
    if: ${{ always() && ( (github.event_name == 'workflow_dispatch' && github.event.inputs.send_metrics_report == 'true') || (github.event_name != 'workflow_dispatch' && vars.METRICS_REPORT_ENABLED == 'true') ) }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install YAML dependency
      run: |
        python -m pip install --upgrade pip
        pip install PyYAML

    - name: Resolve report recipients from config
      id: recipients
      run: |
        python - <<'PY'
        import os
        from pathlib import Path
        import yaml

        config_path = Path("report_delivery.yml")
        fallback = "ekaterina-konchina@yandex.ru"
        recipients = []

        if config_path.exists():
            try:
                payload = yaml.safe_load(config_path.read_text(encoding="utf-8")) or {}
                email_cfg = payload.get("email")
                if isinstance(email_cfg, dict):
                    values = email_cfg.get("recipients")
                    if isinstance(values, list):
                        recipients = [str(v).strip() for v in values if str(v).strip()]
            except Exception as exc:  # noqa: BLE001
                print(f"Failed to parse report_delivery.yml: {exc}")

        if not recipients:
            recipients = [fallback]

        resolved = ",".join(recipients)
        print(f"Resolved recipients: {resolved}")
        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"recipients={resolved}\n")
        PY

    - name: Download metrics dashboard artifact
      uses: actions/download-artifact@v4
      with:
        name: metrics-dashboard-html
        path: reports

    - name: Send metrics dashboard email
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.SMTP_HOST }}
        server_port: ${{ secrets.SMTP_PORT }}
        secure: true
        username: ${{ secrets.SMTP_USERNAME }}
        password: ${{ secrets.SMTP_PASSWORD }}
        from: ${{ secrets.SMTP_FROM }}
        to: ${{ steps.recipients.outputs.recipients }}
        subject: "QA Metrics Dashboard (${{ github.ref_name }})"
        body: "Automated QA metrics dashboard is attached."
        attachments: reports/metrics_dashboard.html

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [ lint, run-tests, publish-allure-report, metrics-email-report ]
    if: always()

    steps:
      - name: Resolve status
        id: status
        run: |
          LINT="${{ needs.lint.result }}"
          TESTS="${{ needs.run-tests.result }}"
          REPORT="${{ needs.publish-allure-report.result }}"
          METRICS="${{ needs.metrics-email-report.result }}"

          if [[ "$LINT" == "failure" || "$TESTS" == "failure" || "$REPORT" == "failure" || "$METRICS" == "failure" ]]; then
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "text=FAILED" >> $GITHUB_OUTPUT
          elif [[ "$LINT" == "cancelled" || "$TESTS" == "cancelled" || "$REPORT" == "cancelled" || "$METRICS" == "cancelled" ]]; then
            echo "emoji=⚪" >> $GITHUB_OUTPUT
            echo "text=CANCELLED" >> $GITHUB_OUTPUT
          else
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "text=PASSED" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          EVENT="${{ github.event_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/index.html"
          METRICS_REPORT_URL="${{ needs.publish-allure-report.outputs.metrics_url }}"
          if [[ -z "$METRICS_REPORT_URL" ]]; then
            METRICS_REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/metrics/index.html"
          fi
          METRICS_LINE="$(printf '• Metrics email report: %s\n' '${{ needs.metrics-email-report.result }}')"

          LINT_LINE=""
          if [[ "$EVENT" != "workflow_dispatch" ]]; then
            LINT_LINE="$(printf '• Lint: %s\n' '${{ needs.lint.result }}')"
          fi

          MESSAGE="$(printf '%s\n\n🌿 <b>Branch:</b> %s\n👤 <b>Triggered by:</b> %s\n🔁 <b>Event:</b> %s\n\n📋 <b>Results:</b>\n%s• Run tests: %s\n• Allure report: %s\n\n🔗 <b>Pipeline:</b>\n%s\n\n📊 <b>Allure report:</b>\n%s\n\n📈 <b>Metrics report (GitHub Pages):</b>\n<a href=\"%s\">Open metrics dashboard</a>\n%s' \
            '${{ steps.status.outputs.emoji }} <b>'"${REPO}"'</b> - tests <b>${{ steps.status.outputs.text }}</b>' \
            "${BRANCH}" \
            "${ACTOR}" \
            "${EVENT}" \
            "${LINT_LINE}" \
            '${{ needs.run-tests.result }}' \
            '${{ needs.publish-allure-report.result }}' \
            "${RUN_URL}" \
            "${REPORT_URL}" \
            "${METRICS_REPORT_URL}" \
            "${METRICS_REPORT_URL}")"
          
          MESSAGE="$(printf '%s%s' "$MESSAGE" "$METRICS_LINE")"
          
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          --data-urlencode "text=${MESSAGE}" \
          --data-urlencode "parse_mode=HTML" \
          --data-urlencode "disable_web_page_preview=true"
