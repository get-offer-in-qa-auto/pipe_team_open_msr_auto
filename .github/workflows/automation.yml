name: Run tests
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: playwright install --with-deps

    - name: OpenMRS Setup
      uses: ./.github/actions/openmrs-setup

    - name: Run API tests
      run: pytest -n 2 -m api --alluredir=allure-results

    - name: Upload Allure results artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results
        if-no-files-found: ignore

  publish-allure-report:
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    steps:
    - uses: actions/checkout@v4

    - name: Download Allure results artifact
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: allure-results
        path: allure-results

    - name: Ensure Allure results directory exists
      run: mkdir -p allure-results

    - name: Prepare report directories
      run: mkdir -p .allure-history-cache

    - name: Generate Allure report with history
      uses: simple-elf/allure-report-action@v1.13
      with:
        allure_results: allure-results
        gh_pages: .allure-history-cache
        allure_history: allure-history
        keep_reports: 20

    - name: Verify generated report files
      run: |
        ls -la allure-history
        test -f allure-history/index.html

    - name: Upload generated Allure HTML artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-html-report
        path: allure-history
        if-no-files-found: error

    - name: Validate Cloudflare secrets
      run: |
        test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" || (echo "CLOUDFLARE_API_TOKEN is not set" && exit 1)
        test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" || (echo "CLOUDFLARE_ACCOUNT_ID is not set" && exit 1)
        test -n "${{ secrets.CLOUDFLARE_PROJECT_NAME }}" || (echo "CLOUDFLARE_PROJECT_NAME is not set" && exit 1)

    - name: Deploy Allure report to Cloudflare Pages
      id: deploy
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy allure-history --project-name ${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch main

    - name: Report URL
      run: |
        echo "Allure report URL: https://${{ secrets.CLOUDFLARE_PROJECT_NAME }}.pages.dev"
        echo "Deploy output:"
        echo "${{ steps.deploy.outputs.command-output }}"
