name: Run tests
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run style checks
      run: pre-commit run --all-files --show-diff-on-failure

  run-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: playwright install --with-deps

    - name: OpenMRS Setup
      uses: ./.github/actions/openmrs-setup

    - name: Run API and UI tests (combined Allure results)
      run: |
        mkdir -p artifacts/logs
        api_exit=0
        ui_exit=0

        pytest -n 2 -m api --alluredir=allure-results --log-file=artifacts/logs/pytest-api.log --log-file-level=INFO || api_exit=$?
        pytest -n 2 -m ui  --alluredir=allure-results --log-file=artifacts/logs/pytest-ui.log --log-file-level=INFO || ui_exit=$?

        if [ "$api_exit" -ne 0 ] || [ "$ui_exit" -ne 0 ]; then
          exit 1
        fi

    - name: Collect OpenMRS Docker logs
      if: always()
      run: |
        mkdir -p artifacts/logs
        docker compose logs --no-color > artifacts/logs/openmrs-docker.log || true

    - name: Upload Allure results artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: allure-results
        if-no-files-found: ignore

    - name: Upload test logs artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: artifacts/logs
        if-no-files-found: ignore

  publish-allure-report:
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    outputs:
      report_url: ${{ steps.report_url.outputs.url }}
    steps:
    - uses: actions/checkout@v4

    - name: Checkout gh-pages branch (history source)
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Download Allure results artifact
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: allure-results
        path: allure-results

    - name: Ensure Allure results directory exists
      run: mkdir -p allure-results

    - name: Prepare report directories
      run: mkdir -p gh-pages

    - name: Generate Allure report with history
      uses: simple-elf/allure-report-action@v1.13
      with:
        allure_results: allure-results
        gh_pages: gh-pages
        allure_history: allure-history
        keep_reports: 20

    - name: Verify generated report files
      run: |
        ls -la allure-history
        test -f allure-history/index.html

    - name: Upload generated Allure HTML artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-html-report
        path: allure-history
        if-no-files-found: error

    - name: Deploy Allure report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
        force_orphan: true

    - name: Publish report URL
      id: report_url
      run: |
        REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/index.html"
        echo "url=${REPORT_URL}" >> "$GITHUB_OUTPUT"
        echo "### Allure report URL" >> "$GITHUB_STEP_SUMMARY"
        echo "${REPORT_URL}" >> "$GITHUB_STEP_SUMMARY"
        echo "Allure report URL: ${REPORT_URL}"
        echo "Allure HTML saved as artifact: allure-html-report"
        echo "Test logs saved as artifact: test-logs"
        

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [ lint, run-tests, publish-allure-report ]
    if: always()

    steps:
      - name: Resolve status
        id: status
        run: |
          LINT="${{ needs.lint.result }}"
          TESTS="${{ needs.run-tests.result }}"
          REPORT="${{ needs.publish-allure-report.result }}"

          if [[ "$LINT" == "failure" || "$TESTS" == "failure" || "$REPORT" == "failure" ]]; then
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "text=FAILED" >> $GITHUB_OUTPUT
          elif [[ "$LINT" == "cancelled" || "$TESTS" == "cancelled" || "$REPORT" == "cancelled" ]]; then
            echo "emoji=⚪" >> $GITHUB_OUTPUT
            echo "text=CANCELLED" >> $GITHUB_OUTPUT
          else
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "text=PASSED" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          EVENT="${{ github.event_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/index.html"

          MESSAGE="${{ steps.status.outputs.emoji }} <b>${REPO}</b> — tests <b>${{ steps.status.outputs.text }}</b>

          🌿 <b>Branch:</b> ${BRANCH}
          👤 <b>Triggered by:</b> ${ACTOR}
          🔁 <b>Event:</b> ${EVENT}
    
          📋 <b>Results:</b>
          • Lint: ${{ needs.lint.result }}
          • Run tests: ${{ needs.run-tests.result }}
          • Allure report: ${{ needs.publish-allure-report.result }}
    
          🔗 <b>Pipeline:</b>
          ${RUN_URL}
    
          📊 <b>Allure report:</b>
          ${REPORT_URL}"
          
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          --data-urlencode "text=${MESSAGE}" \
          --data-urlencode "parse_mode=HTML" \
          --data-urlencode "disable_web_page_preview=true"
